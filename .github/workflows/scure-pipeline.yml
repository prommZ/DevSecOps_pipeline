name: Secure CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Secrets Scan (Gitleaks)
      - name: Run Gitleaks Scan
        uses: zricethezav/gitleaks-action@v2

      # 3. SAST (Semgrep)
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1

      # 4. Dependency Scan (Trivy FS)
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'

      # 5. Build Docker Image
      - name: Build Docker Image
        run: docker build -t devsecops-app .

      # 6. Image Scan (Trivy Image)
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-app'
          format: 'table'

      # 7. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8. Push Image
      - name: Push Image
        run: |
          docker tag devsecops-app prommz/devsecops-app
          docker push prommz/devsecops-app

